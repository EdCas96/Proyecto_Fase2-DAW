<!DOCTYPE html>

    <title>Pokémon Bank | Depósito</title>
      <link rel="stylesheet" href="Assets/CSS/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Assets/CSS/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>


<body ng-controller="pokeController as bank">
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container-fluid">
            <span class="navbar-brand text-warning fw-bold">POKÉ-BANK</span>
            <div class="d-flex align-items-center">
                <!--<span class="me-3">Entrenador: <b>{{bank.persona.name}}</b></span>
                <span class="me-3">Cuenta: <b>{{bank.persona.cuenta}}</b></span>
                <span class="badge bg-success fs-6">Saldo: {{bank.persona.fondos | currency}}</span>-->
                <span class="me-3">Entrenador: <b>ASH</b></span>
                <span class="me-3">Cuenta: <b>129485930193</b></span>
                <span class="badge bg-success fs-6">Saldo: $5000</span>
                <button class="btn btn-outline-danger btn-sm ms-3" onclick="location.href='login.html'">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <div class="row g-4">
            <div class="col-md-3 col-6">

                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="retiro.html" class="action-card">
                    <i class="fas fa-hand-holding-usd"></i>

                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="consulta.html" class="action-card">
                    <i class="fas fa-search-dollar"></i>
                    <h5>Consulta</h5>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="servicios.html" class="action-card">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <h5>Servicios</h5>
                </a>
            </div>
        </div>
    </div>
