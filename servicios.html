<!DOCTYPE html>
<html lang="es" ng-app="pokeBank">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank | Pago de Servicios</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Assets/CSS/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="pokeController as bank">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top border-bottom border-warning shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">
                <i class="fas fa-bolt me-2"></i>POKÉ-BANK
            </a>
            <div class="ms-auto d-flex align-items-center text-white">
                <div class="me-4 d-none d-md-block border-end pe-4 text-end">
                    <small class="text-secondary d-block">Disponible</small>
                    <span class="fw-bold text-success">$5000</span>
                    <!--<span class="fw-bold text-success">{{bank.persona.fondos | currency}}</span>-->
                </div>
                <button class="btn btn-outline-danger btn-sm" onclick="location.href='login.html'">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container main-container">
        <div class="text-center mb-5 mt-4">
            <h1 class="display-5 fw-bold text-white">Pago de Servicios</h1>
            <p class="text-secondary">Selecciona el servicio que deseas cancelar hoy</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-12 col-sm-6 col-md-4">
                <a href="energia.html" class="action-card py-5">
                    <div class="icon-circle mb-3 bg-warning text-dark">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <h3 class="h5 fw-bold">Energía Eléctrica</h3>
                    <p class="small text-secondary mb-0">Pago de recibos de luz</p>
                </a>
            </div>

            <div class="col-12 col-sm-6 col-md-4">
                <a href="agua.html" class="action-card py-5">
                    <div class="icon-circle mb-3 bg-info text-white">
                        <i class="fas fa-tint"></i>
                    </div>
                    <h3 class="h5 fw-bold">Agua Potable</h3>
                    <p class="small text-secondary mb-0">Servicio hídrico municipal</p>
                </a>
            </div>

            <div class="col-12 col-sm-6 col-md-4">
                <a href="internet.html" class="action-card py-5">
                    <div class="icon-circle mb-3 bg-primary text-white">
                        <i class="fas fa-wifi"></i>
                    </div>
                    <h3 class="h5 fw-bold">Internet / Telefonía</h3>
                    <p class="small text-secondary mb-0">Paquetes de datos y fijos</p>
                </a>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-outline-light btn-lg px-5 border-opacity-25 rounded-pill">
                <i class="fas fa-arrow-left me-2"></i> Volver al Menú Principal
            </a>
        </div>
    </main>

    <style>
        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto;
            transition: 0.3s;
        }

        .action-card:hover .icon-circle {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px rgba(255, 203, 5, 0.4);
        }

        .main-container {
            padding-top: 100px;
            padding-bottom: 50px;
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!--<script src="Assets/JS/poke-script.js"></script>-->

</body>
</html>
