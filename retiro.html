<!DOCTYPE html>
<html lang="es" ng-app="pokeBank">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank | Retiro de Efectivo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Assets/CSS/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="pokeController as bank">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top border-bottom border-warning shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">
                <i class="fas fa-bolt me-2"></i>POKÉ-BANK
            </a>
            <div class="ms-auto d-flex align-items-center text-white">
                <div class="me-4 d-none d-md-block">
                    <small class="text-secondary d-block">Entrenador</small>
                    <span class="fw-bold">ASH</span>
                    <!--<span class="fw-bold">{{bank.persona.name}}</span>-->
                </div>
                <div class="me-4 border-start ps-4 d-none d-sm-block">
                    <small class="text-secondary d-block">Saldo Disponible</small>
                    <span class="fw-bold text-success">$5000</span>
                    <!--<span class="fw-bold text-success">{{bank.persona.fondos | currency}}</span>-->
                </div>
                <button class="btn btn-outline-danger btn-sm ms-2" onclick="location.href='login.html'">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 80px;">
        
        <div class="col-12 col-md-8 col-lg-6">
            <section class="form-section p-4 p-md-5 rounded-4 shadow-lg" 
                     style="background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 69, 58, 0.3);">
                
                <div class="text-center mb-4">
                    <div class="display-4 text-danger mb-2">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <h1 class="h3 fw-bold text-white">Retiro de Efectivo</h1>
                    <p class="text-secondary">¿Cuánto dinero deseas retirar de tu Poke-cuenta?</p>
                </div>

                <form name="formulario" novalidate>
                    <div class="mb-4">
                        <label for="cant_retiro" class="form-label text-danger fw-semibold">Monto a retirar</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-dark border-secondary text-danger fw-bold">$</span>
                            <input type="number" 
                                   class="form-control bg-dark text-white border-secondary" 
                                   id="cant_retiro" 
                                   placeholder="0.00" 
                                   ng-model="bank.montoRetiro"
                                   required>
                        </div>
                        
                        <div class="mt-3 p-2 rounded-2" style="background: rgba(255, 193, 7, 0.1); border: 1px dashed #ffc107;">
                            <small class="text-warning d-block text-center">
                                <i class="fas fa-exclamation-triangle me-1"></i> 
                                Por tu seguridad, no compartas tu PIN con nadie.
                            </small>
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" 
                                class="btn btn-danger btn-lg fw-bold py-3 shadow" 
                                ng-click="bank.retirar()">
                            <i class="fas fa-hand-holding-usd me-2"></i> Confirmar Poke-Retiro
                        </button>
                        
                        <a href="index.html" class="btn btn-outline-light py-2">
                            <i class="fas fa-arrow-left me-2"></i> Cancelar y volver
                        </a>
                    </div>
                </form>

            </section>
        </div>

    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!--<script src="Assets/JS/poke-script.js"></script>-->

</body>
</html>
