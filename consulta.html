<!DOCTYPE html>
<html lang="en" ng-app="pokeBank">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Pokémon Bank | Depósito</title>
      <link rel="stylesheet" href="Assets/CSS/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Assets/CSS/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>


<body ng-controller="pokeController as bank">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top border-bottom border-warning">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">
                <i class="fas fa-bolt me-2"></i>POKÉ-BANK
            </a>
            <div class="ms-auto d-flex align-items-center text-white">
                <div class="me-3 d-none d-md-block">
                    <small class="text-secondary d-block text-end">Entrenador</small>
                    <span class="fw-bold">{{bank.persona.name}}</span>
                </div>
                <button class="btn btn-outline-danger btn-sm" onclick="location.href='login.html'">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        
        <div class="col-12 col-md-6">
            <section class="form-section p-5 rounded-4 text-center shadow-lg" 
                     style="background: rgba(25, 25, 25, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 203, 5, 0.3);">
                
                <div class="mb-4">
                    <div class="display-3 text-warning mb-3">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <h1 class="h2 fw-bold text-white">Estado de Cuenta</h1>
                    <p class="text-secondary">Consulta tus Poke-fondos disponibles</p>
                </div>

                <div class="bg-dark p-4 rounded-3 border border-secondary mb-4 shadow-inner">
                    <small class="text-uppercase text-warning fw-bold spacing-1" style="letter-spacing: 2px;">Saldo Actual</small>
                    <div class="display-4 fw-bold text-success mt-2">
                        <!--{{bank.persona.fondos | currency}}-->
                        $5000
                    </div>
                </div>

                <div class="row text-start mb-5">
                    <div class="col-6">
                        <small class="text-secondary d-block">Número de Cuenta</small>
                        <span class="text-white">76543223456</span>
                        <!--<span class="text-white">{{bank.persona.cuenta}}</span>-->
                    </div>
                    <div class="col-6 text-end">
                        <small class="text-secondary d-block">Tipo de Cuenta</small>
                        <span class="badge bg-warning text-dark">Entrenador Pro</span>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button type="button" class="btn btn-warning btn-lg fw-bold py-3" onclick="window.print()">
                        <i class="fas fa-print me-2"></i> Imprimir Comprobante
                    </button>
                    
                    <a href="index.html" class="btn btn-outline-light py-2">
                        <i class="fas fa-chevron-left me-2"></i> Volver al Menú
                    </a>
                </div>

            </section>
        </div>

    </main>    
    <!--Boton atras-->
    <button type="button" value="atras" name="atras" class="btn btn-dark" id="btnatras" onclick="location.href='index.html'"><i class="fas fa-arrow-circle-left"></i> Atras</button>
  
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!--<script src="Assets/JS/poke-script.js"></script>-->
    
</body>
</html>
