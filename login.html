<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank | Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Assets/CSS/style-login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="user-img">
                <img src="Assets/IMG/pikachu2.jpg" alt="Pikachu" class="img-fluid">
            </div>
            
            <h2 class="bank-title">POKÉMON BANK</h2>
            <p class="text-white-50">Ingresa tu PIN de entrenador</p>

            <form>
                <div class="input-group mb-4">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input id="PIN" type="password" 
                           class="form-control" 
                           placeholder="0 0 0 0" 
                           maxlength="4" 
                           inputmode="numeric" 
                           autocomplete="one-time-code">
                </div>
                
                <!--<button type="button" class="btn btn-login w-100" onclick="login()">
                    <i class="fas fa-sign-in-alt me-2"></i> Ingresar
                </button>-->
                <a href="index.html">
                    <button type="button" class="btn btn-login w-100" >
                    <i class="fas fa-sign-in-alt me-2"></i> Ingresar
                </button>
                </a>
                
            </form>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!--<script src="Assets/JS/poke-script.js"></script>-->
</body>
</html>
